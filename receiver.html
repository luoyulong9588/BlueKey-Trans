<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>HID 物理接收终端</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; padding: 40px; display: flex; justify-content: center; }
        .box { background: #fff; padding: 30px; border-radius: 24px; width: 100%; max-width: 500px; text-align: center; }
        textarea { width: 100%; height: 200px; margin-top: 15px; border-radius: 12px; border: 1px solid #ddd; padding: 10px; display: none; }
        #st { color: #007AFF; font-weight: bold; margin: 15px 0; }
    </style>
</head>
<body>
<div class="box">
    <h3>物理链路接收中...</h3>
    <div id="st">等待信号 (LUO!)</div>
    <div id="cnt" style="font-size:12px; color:#999">0 字符</div>
    <textarea id="resTxt" readonly></textarea>
    <button id="copyBtn" style="display:none; width:100%; padding:10px; margin-top:10px; background:#007AFF; color:#fff; border:none; border-radius:8px;" onclick="copyResult()">复制文本内容</button>
</div>

<script>
let buf = "", active = false;

window.addEventListener('keydown', (e) => {
    if (e.key.length > 1 && !"#|.".includes(e.key)) return;
    if (!active) {
        buf += e.key;
        if (buf.includes("LUO!")) { active = true; buf = "LUO!"; document.getElementById('st').innerText = "🚀 正在接收数据流..."; }
        return;
    }
    if (e.key === '#') { active = false; decode(); return; }
    buf += e.key;
    document.getElementById('cnt').innerText = buf.length + " 字符";
});

function decode() {
    try {
        const p = buf.split('|');
        const name = p[1], data = p[2];
        const bin = Uint8Array.from(atob(data), c => c.charCodeAt(0));
        const ori = pako.ungzip(bin);

        if (name === "TEXT_DATA") {
            const text = new TextDecoder().decode(ori);
            const area = document.getElementById('resTxt');
            area.value = text;
            area.style.display = "block";
            document.getElementById('copyBtn').style.display = "block";
            document.getElementById('st').innerText = "✅ 文本接收成功！";
        } else {
            const url = URL.createObjectURL(new Blob([ori]));
            const a = document.createElement('a');
            a.href = url; a.download = name; a.click();
            document.getElementById('st').innerText = "✅ 文件已下载: " + name;
        }
        buf = "";
    } catch (err) { alert("解析失败，请检查输入法: " + err); buf = ""; }
}

function copyResult() {
    const t = document.getElementById('resTxt');
    t.select();
    document.execCommand('copy');
    alert("已复制到剪贴板");
}
</script>
</body>
</html>
